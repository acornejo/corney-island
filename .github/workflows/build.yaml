on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/*.yaml'
      - '.github/actions/*/action.yaml'
      - 'ergogen/footprints/*.js'
      - 'ergogen/config.yaml'
      - 'kibot/*'
      - 'freerouting/*'
      - 'package.json'

name: Build
jobs:
  board:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [main_board]
    name: Generate ${{ matrix.board }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Generate unrouted PCBs with Ergogen (definition in package.json)
        run: npm run build
      - name: Run KiBot to generate images, gerbers for the plates
        uses: ./.github/actions/kibot
        with:
          boards: frontplate backplate 
          config: default
      - name: Run KiBot to generate images, gerbers for the unrouted board
        uses: ./.github/actions/kibot
        with:
          boards: ${{ matrix.board }}
          config: default
      - name: Export DSN file for Freerouting
        uses: ./.github/actions/export-dsn
        with:
          boards: ${{ matrix.board }}
      - name: Autoroute PCB
        uses: ./.github/actions/autoroute
        with:
          boards: ${{ matrix.board }}
      - name: Import SES
        uses: ./.github/actions/import-ses
        with:
          boards: ${{ matrix.board }}
      - name: Run KiBot to generate images, gerbers for the autorouted board
        uses: ./.github/actions/kibot
        with:
          boards: ${{ matrix.board }}_autorouted
          config: boards
      - name: Persist output
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.board }}
          if-no-files-found: error
          overwrite: true
          path:  |
            cases
            gerbers
            images
            outlines
            pcbs
